    # Technical: the Agent engine deployment configuration consumes this as an integer. Unit: milliseconds; use 0 only where the owning policy explicitly treats it as immediate or disabled.
    AGENT_MOB_PHYSICS_IMPACT_DELAY_OFFSET_MS: -50
    # Values: true or false. Recommended: false for routine production; use true only for a bounded diagnostic or load-test session (tested baseline false).
