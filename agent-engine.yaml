# Deployment-level configuration owned by the Agent engine.
#
# Content IDs, map geometry, plan definitions, personality profiles, AP/SP builds,
# and TownLife venue catalogs remain versioned resources under src/main/resources/agents.
# Cosmic server/client/world settings remain in config.yaml.
#
# Every value includes:
# - Values: the accepted scalar domain or known enum choices.
# - Recommended: a conservative operating band around the tested baseline.
# These recommendations are tuning guidance, not additional validation rules. Paired bounds,
# scheduler limits, and dependent coefficients must still be changed together and soak-tested.
agent:
    # Mob reaction and server-side mob physics
    # Values: OFF, SYNTHETIC, or PHYSICS. Recommended: PHYSICS for realistic observed maps; use SYNTHETIC only for compatibility testing and OFF only to disable Agent-driven mob reactions.
    # Purpose: Chooses how monsters react to Agent attacks: PHYSICS uses full movement simulation, SYNTHETIC uses simplified reactions, and OFF disables Agent-driven monster reactions.
    # Technical: the Agent engine deployment configuration consumes this as a text. Domain: component-specific policy value; startup validation rejects missing, blank, or malformed values.
    AGENT_MOB_REACTION_MODE: PHYSICS
    # Values: a finite non-negative integer; unit: map pixels. Recommended: 6-24 around the tested baseline 12; benchmark or observe behavior before moving outside this band.
    # Purpose: Controls the distance or margin used for synthetic monster knockback distance horizontal. Higher values allow action from farther away or leave more space; lower values require closer, more precise positioning.
    # Technical: the Agent engine deployment configuration consumes this as an integer. Unit: MapleStory map pixels; horizontal and vertical values use the server map coordinate system.
    AGENT_SYNTHETIC_MOB_KNOCKBACK_DISTANCE_X: 12
    # Values: a finite non-negative integer; unit: milliseconds. Recommended: 125-500 around the tested baseline 250; benchmark or observe behavior before moving outside this band.
    # Purpose: Controls how long Agents remain in or wait for synthetic monster knockback duration. Higher values make that pause or state last longer; lower values make them continue sooner.
    # Technical: the Agent engine deployment configuration consumes this as an integer. Unit: milliseconds; use 0 only where the owning policy explicitly treats it as immediate or disabled.
    AGENT_SYNTHETIC_MOB_KNOCKBACK_DURATION_MS: 250
    # Values: a finite non-negative integer; unit: milliseconds. Recommended: 175-700 around the tested baseline 350; benchmark or observe behavior before moving outside this band.
    # Purpose: Controls how long Agents remain in or wait for synthetic monster control hold. Higher values make that pause or state last longer; lower values make them continue sooner.
    # Technical: the Agent engine deployment configuration consumes this as an integer. Unit: milliseconds; use 0 only where the owning policy explicitly treats it as immediate or disabled.
    AGENT_SYNTHETIC_MOB_CONTROL_HOLD_MS: 350
    # Values: a finite non-negative integer; unit: milliseconds. Recommended: 37-150 around the tested baseline 75; benchmark or observe behavior before moving outside this band.
    # Purpose: Controls how frequently monster physics publication interval updates. Lower values make Agents react more quickly and smoothly but use more server work; higher values react more slowly and reduce load.
    # Technical: the Agent engine deployment configuration consumes this as an integer. Unit: milliseconds; use 0 only where the owning policy explicitly treats it as immediate or disabled. It governs recurring work, so lowering it increases invocation frequency and operational load.
    AGENT_MOB_PHYSICS_PUBLICATION_INTERVAL_MS: 75
    # Values: a finite non-negative integer. Recommended: 6-24 around the tested baseline 12; benchmark or observe behavior before moving outside this band.
    # Purpose: Limits how many monster physics maximum catch up steps can be handled in one pass or kept at once. Higher values let more Agent work progress together; lower values spread the work out and reduce peak load.
    # Technical: the Agent engine deployment configuration consumes this as an integer. Domain: non-negative count, capacity, or threshold unless the owning component documents a sentinel.
    AGENT_MOB_PHYSICS_MAX_CATCH_UP_STEPS: 12
    # Values: a finite non-negative integer; unit: milliseconds. Recommended: 50-200 around the tested baseline 100; benchmark or observe behavior before moving outside this band.
    # Purpose: Controls how long Agents remain in or wait for monster physics observer warmup. Higher values make that pause or state last longer; lower values make them continue sooner.
    # Technical: the Agent engine deployment configuration consumes this as an integer. Unit: milliseconds; use 0 only where the owning policy explicitly treats it as immediate or disabled.
    AGENT_MOB_PHYSICS_OBSERVER_WARMUP_MS: 100
    # Values: a finite non-negative integer; unit: milliseconds. Recommended: 3500-14000 around the tested baseline 7000; benchmark or observe behavior before moving outside this band.
    # Purpose: Controls how long Agents may remain in monster physics aggression timeout before recovery begins. Higher values wait longer; lower values retry, recover, or abandon it sooner.
    # Technical: the Agent engine deployment configuration consumes this as an integer. Unit: milliseconds; use 0 only where the owning policy explicitly treats it as immediate or disabled. It participates in bounded failure handling and should remain long enough for the normal operation to complete.
    AGENT_MOB_PHYSICS_AGGRO_TIMEOUT_MS: 7000
    # Values: a finite non-negative integer; unit: map pixels. Recommended: start from the tested baseline 0 and increase only when the owning policy needs a non-zero tolerance; benchmark or observe behavior before moving outside this band.
    # Purpose: Controls the distance or margin used for monster physics stop distance horizontal. Higher values allow action from farther away or leave more space; lower values require closer, more precise positioning.
    # Technical: the Agent engine deployment configuration consumes this as an integer. Unit: MapleStory map pixels; horizontal and vertical values use the server map coordinate system.
    AGENT_MOB_PHYSICS_STOP_DISTANCE_X: 0
    # Values: a finite non-negative integer; unit: map pixels. Recommended: start from the tested baseline 0 and increase only when the owning policy needs a non-zero tolerance; benchmark or observe behavior before moving outside this band.
    # Purpose: Controls the distance or margin used for monster physics resume distance horizontal. Higher values allow action from farther away or leave more space; lower values require closer, more precise positioning.
    # Technical: the Agent engine deployment configuration consumes this as an integer. Unit: MapleStory map pixels; horizontal and vertical values use the server map coordinate system.
    AGENT_MOB_PHYSICS_RESUME_DISTANCE_X: 0
    # Values: a finite non-negative integer. Recommended: 12-48 around the tested baseline 24; benchmark or observe behavior before moving outside this band.
    # Purpose: Controls the horizontal leeway for monster physics fly dead zone horizontal. Higher values let Agents drift farther left or right before correcting; lower values make them correct sooner.
    # Technical: the Agent engine deployment configuration consumes this as an integer. Domain: component-specific policy value; startup validation rejects missing, blank, or malformed values.
    AGENT_MOB_PHYSICS_FLY_DEAD_ZONE_X: 24
    # Values: a finite non-negative integer. Recommended: 10-40 around the tested baseline 20; benchmark or observe behavior before moving outside this band.
    # Purpose: Controls the vertical leeway for monster physics fly dead zone vertical. Higher values let Agents drift farther up or down before correcting; lower values make them correct sooner.
    # Technical: the Agent engine deployment configuration consumes this as an integer. Domain: component-specific policy value; startup validation rejects missing, blank, or malformed values.
    AGENT_MOB_PHYSICS_FLY_DEAD_ZONE_Y: 20
    # Values: integer from 0 to 100 inclusive. Recommended: 75-100 for initial tuning around the tested baseline 100; change gradually and observe crowd/load effects.
    # Purpose: Controls the visible strength or frequency of monster physics speed. Higher values make the effect stronger or more common; lower values make it weaker or rarer.
    # Technical: the Agent engine deployment configuration consumes this as an integer. Domain: percentage from 0 to 100 inclusive.
    AGENT_MOB_PHYSICS_SPEED_PERCENT: 100
    # Values: a finite non-negative integer; unit: milliseconds. Recommended: 250-1000 around the tested baseline 500; benchmark or observe behavior before moving outside this band.
    # Purpose: Sets the longest monster physics direction reaction time an Agent may receive. Higher values allow longer occurrences; lower values end them sooner.
    # Technical: the Agent engine deployment configuration consumes this as an integer. Unit: milliseconds; use 0 only where the owning policy explicitly treats it as immediate or disabled. Paired minimum/maximum values define an inclusive random or validation range and must not be inverted.
    AGENT_MOB_PHYSICS_DIRECTION_REACTION_MAX_MS: 500
    # Values: a finite non-negative integer; unit: milliseconds. Recommended: 450-1800 around the tested baseline 900; benchmark or observe behavior before moving outside this band.
    # Purpose: Controls how long Agents must wait before repeating monster physics jump. Higher values make repeats less frequent; lower values let them repeat sooner.
    # Technical: the Agent engine deployment configuration consumes this as an integer. Unit: milliseconds; use 0 only where the owning policy explicitly treats it as immediate or disabled.
    AGENT_MOB_PHYSICS_JUMP_COOLDOWN_MS: 900
    # Values: a finite non-negative integer; unit: milliseconds. Recommended: 450-1800 around the tested baseline 900; benchmark or observe behavior before moving outside this band.
    # Purpose: Controls random timing variation for monster physics jump cooldown. Higher values make Agents less synchronized; lower values make their timing more uniform.
    # Technical: the Agent engine deployment configuration consumes this as an integer. Unit: milliseconds; use 0 only where the owning policy explicitly treats it as immediate or disabled.
    AGENT_MOB_PHYSICS_JUMP_COOLDOWN_JITTER_MS: 900
    # Values: a finite non-negative integer; unit: map pixels. Recommended: 24-96 around the tested baseline 48; benchmark or observe behavior before moving outside this band.
    # Purpose: Controls the distance or margin used for monster physics jump target height. Higher values allow action from farther away or leave more space; lower values require closer, more precise positioning.
    # Technical: the Agent engine deployment configuration consumes this as an integer. Unit: MapleStory map pixels; horizontal and vertical values use the server map coordinate system.
    AGENT_MOB_PHYSICS_JUMP_TARGET_HEIGHT: 48
    # Values: a finite non-negative integer; unit: map pixels. Recommended: 24-96 around the tested baseline 48; benchmark or observe behavior before moving outside this band.
    # Purpose: Controls the positional leeway for monster physics maximum safe edge. Higher values tolerate more separation before Agents correct course; lower values make them align sooner.
    # Technical: the Agent engine deployment configuration consumes this as an integer. Unit: MapleStory map pixels; horizontal and vertical values use the server map coordinate system.
    AGENT_MOB_PHYSICS_MAX_SAFE_EDGE_PX: 48
    # Values: a finite non-negative integer; unit: map pixels. Recommended: 9-36 around the tested baseline 18; benchmark or observe behavior before moving outside this band.
    # Purpose: Controls the distance or margin used for monster physics left edge inset. Higher values allow action from farther away or leave more space; lower values require closer, more precise positioning.
    # Technical: the Agent engine deployment configuration consumes this as an integer. Unit: MapleStory map pixels; horizontal and vertical values use the server map coordinate system.
    AGENT_MOB_PHYSICS_LEFT_EDGE_INSET_PX: 18
    # Values: a finite non-negative integer; unit: map pixels. Recommended: 5-20 around the tested baseline 10; benchmark or observe behavior before moving outside this band.
    # Purpose: Controls the distance or margin used for monster physics right edge inset. Higher values allow action from farther away or leave more space; lower values require closer, more precise positioning.
    # Technical: the Agent engine deployment configuration consumes this as an integer. Unit: MapleStory map pixels; horizontal and vertical values use the server map coordinate system.
    AGENT_MOB_PHYSICS_RIGHT_EDGE_INSET_PX: 10
    # Values: a finite non-negative integer; unit: milliseconds. Recommended: 125-500 around the tested baseline 250; benchmark or observe behavior before moving outside this band.
    # Purpose: Controls random timing variation for monster physics behavior. Higher values make Agents less synchronized; lower values make their timing more uniform.
    # Technical: the Agent engine deployment configuration consumes this as an integer. Unit: milliseconds; use 0 only where the owning policy explicitly treats it as immediate or disabled.
    AGENT_MOB_PHYSICS_BEHAVIOR_JITTER_MS: 250
    # Values: integer from 0 to 100 inclusive. Recommended: 40-80 for initial tuning around the tested baseline 60; change gradually and observe crowd/load effects.
    # Purpose: Controls how likely monster physics edge retreat chance is. Higher values make Agents use this behavior more often; lower values make it rarer.
    # Technical: the Agent engine deployment configuration consumes this as an integer. Domain: percentage from 0 to 100 inclusive.
    AGENT_MOB_PHYSICS_EDGE_RETREAT_CHANCE_PERCENT: 60
    # Values: a finite non-negative integer; unit: milliseconds. Recommended: 125-500 around the tested baseline 250; benchmark or observe behavior before moving outside this band. Keep it less than or equal to AGENT_MOB_PHYSICS_EDGE_IDLE_MAX_MS.
    # Purpose: Sets the shortest monster physics edge idle time an Agent may receive. Higher values make every occurrence last longer; lower values allow shorter occurrences.
    # Technical: the Agent engine deployment configuration consumes this as an integer. Unit: milliseconds; use 0 only where the owning policy explicitly treats it as immediate or disabled. Paired minimum/maximum values define an inclusive random or validation range and must not be inverted.
    AGENT_MOB_PHYSICS_EDGE_IDLE_MIN_MS: 250
    # Values: a finite non-negative integer; unit: milliseconds. Recommended: 350-1400 around the tested baseline 700; benchmark or observe behavior before moving outside this band. Keep it greater than or equal to AGENT_MOB_PHYSICS_EDGE_IDLE_MIN_MS.
    # Purpose: Sets the longest monster physics edge idle time an Agent may receive. Higher values allow longer occurrences; lower values end them sooner.
    # Technical: the Agent engine deployment configuration consumes this as an integer. Unit: milliseconds; use 0 only where the owning policy explicitly treats it as immediate or disabled. Paired minimum/maximum values define an inclusive random or validation range and must not be inverted.
    AGENT_MOB_PHYSICS_EDGE_IDLE_MAX_MS: 700
    # Values: a finite non-negative integer; unit: milliseconds. Recommended: 125-500 around the tested baseline 250; benchmark or observe behavior before moving outside this band. Keep it less than or equal to AGENT_MOB_PHYSICS_EDGE_RETREAT_MAX_MS.
    # Purpose: Sets the shortest monster physics edge retreat time an Agent may receive. Higher values make every occurrence last longer; lower values allow shorter occurrences.
    # Technical: the Agent engine deployment configuration consumes this as an integer. Unit: milliseconds; use 0 only where the owning policy explicitly treats it as immediate or disabled. Paired minimum/maximum values define an inclusive random or validation range and must not be inverted.
    AGENT_MOB_PHYSICS_EDGE_RETREAT_MIN_MS: 250
    # Values: a finite non-negative integer; unit: milliseconds. Recommended: 300-1200 around the tested baseline 600; benchmark or observe behavior before moving outside this band. Keep it greater than or equal to AGENT_MOB_PHYSICS_EDGE_RETREAT_MIN_MS.
    # Purpose: Sets the longest monster physics edge retreat time an Agent may receive. Higher values allow longer occurrences; lower values end them sooner.
    # Technical: the Agent engine deployment configuration consumes this as an integer. Unit: milliseconds; use 0 only where the owning policy explicitly treats it as immediate or disabled. Paired minimum/maximum values define an inclusive random or validation range and must not be inverted.
    AGENT_MOB_PHYSICS_EDGE_RETREAT_MAX_MS: 600
    # Values: a finite non-negative integer; unit: map pixels. Recommended: 4-16 around the tested baseline 8; benchmark or observe behavior before moving outside this band. Keep it less than or equal to AGENT_MOB_PHYSICS_RETREAT_MAX_DISTANCE_PX.
    # Purpose: Sets the shortest distance used for monster physics retreat. Higher values keep Agents or monsters farther apart; lower values allow them closer together.
    # Technical: the Agent engine deployment configuration consumes this as an integer. Unit: MapleStory map pixels; horizontal and vertical values use the server map coordinate system.
    AGENT_MOB_PHYSICS_RETREAT_MIN_DISTANCE_PX: 8
    # Values: a finite non-negative integer; unit: map pixels. Recommended: 12-48 around the tested baseline 24; benchmark or observe behavior before moving outside this band. Keep it greater than or equal to AGENT_MOB_PHYSICS_RETREAT_MIN_DISTANCE_PX.
    # Purpose: Sets the farthest distance used for monster physics retreat. Higher values allow movement or interaction from farther away; lower values keep it closer.
    # Technical: the Agent engine deployment configuration consumes this as an integer. Unit: MapleStory map pixels; horizontal and vertical values use the server map coordinate system.
    AGENT_MOB_PHYSICS_RETREAT_MAX_DISTANCE_PX: 24
    # Values: a finite non-negative integer; unit: milliseconds. Recommended: 250-1000 around the tested baseline 500; benchmark or observe behavior before moving outside this band.
