    # Values: a finite non-negative integer. Recommended: 128-512 around the tested baseline 256; benchmark or observe behavior before moving outside this band.
    # Purpose: Limits how many maximum work items per cycle can be handled in one pass or kept at once. Higher values let more Agent work progress together; lower values spread the work out and reduce peak load.
