    # Technical: the Agent engine deployment configuration consumes this as an integer. Unit: milliseconds; use 0 only where the owning policy explicitly treats it as immediate or disabled.
    AGENT_MOB_PHYSICS_STUCK_DETECT_MS: 500
    # Values: integer from 0 to 100 inclusive. Recommended: 45-85 for initial tuning around the tested baseline 65; change gradually and observe crowd/load effects.
    # Purpose: Controls how likely monster physics stuck retreat chance is. Higher values make Agents use this behavior more often; lower values make it rarer.
    # Technical: the Agent engine deployment configuration consumes this as an integer. Domain: percentage from 0 to 100 inclusive.
    AGENT_MOB_PHYSICS_STUCK_RETREAT_CHANCE_PERCENT: 65
    # Values: integer from 0 to 100 inclusive. Recommended: 30-70 for initial tuning around the tested baseline 50; change gradually and observe crowd/load effects.
    # Purpose: Controls the visible strength or frequency of monster physics knockback. Higher values make the effect stronger or more common; lower values make it weaker or rarer.
    # Technical: the Agent engine deployment configuration consumes this as an integer. Domain: percentage from 0 to 100 inclusive.
    AGENT_MOB_PHYSICS_KNOCKBACK_PERCENT: 50
    # Values: a finite non-negative integer; unit: milliseconds. Recommended: 125-500 around the tested baseline 250; benchmark or observe behavior before moving outside this band.
    # Purpose: Controls how long Agents remain in or wait for monster physics flinch recovery. Higher values make that pause or state last longer; lower values make them continue sooner.
    # Technical: the Agent engine deployment configuration consumes this as an integer. Unit: milliseconds; use 0 only where the owning policy explicitly treats it as immediate or disabled. It participates in bounded failure handling and should remain long enough for the normal operation to complete.
    AGENT_MOB_PHYSICS_FLINCH_RECOVERY_MS: 250
    # Values: a finite non-negative integer; unit: milliseconds. Recommended: retain the tested baseline 0 only when the owning policy defines it as immediate or disabled; benchmark or observe behavior before moving outside this band.
