    # Values: integer from 0 to 100 inclusive. Recommended: 75-100 for initial tuning around the tested baseline 100; change gradually and observe crowd/load effects.
    # Purpose: Controls how long Agents wait or remain in monster physics impact delay. Higher values make the pause or activity last longer; lower values make them move on sooner.
