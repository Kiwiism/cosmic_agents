    # Technical: the Agent engine deployment configuration consumes this as an integer. Unit: milliseconds; use 0 only where the owning policy explicitly treats it as immediate or disabled.
    AGENT_MOB_PHYSICS_POST_FLINCH_CHASE_RAMP_MS: 0
    # Values: true or false. Recommended: retain the tested baseline false unless deliberately enabling or disabling this isolated capability.
    # Purpose: When enabled, Agents use monster physics hit1. When disabled, they skip it while their other capabilities continue normally.
    # Technical: the Agent engine deployment configuration consumes this as a boolean. Domain: true or false. The disabled path must bypass only this feature and preserve the generic Agent lifecycle.
