    # Technical: the "behavior adaptation state" component consumes this as an integer. Domain: component-specific policy value; startup validation rejects missing, blank, or malformed values. The owning adaptation state adds or subtracts this magnitude per event and clamps the result to its configured state bounds.
    server.agents.behavior.AgentBehaviorAdaptationState.TARGET_LOST_CONFIDENCE_DELTA: '2'
    # Values: a finite non-negative integer. Recommended: 2-8 around the tested baseline 4; benchmark or observe behavior before moving outside this band.
    # Purpose: Controls how strongly target lost frustration delta contributes to Agent behavior. Values nearer 1 give it more influence; values nearer 0 give it less.
    # Technical: the "behavior adaptation state" component consumes this as an integer. Domain: decimal ratio; 0.0 means none and 1.0 means the full reference amount unless the owning policy documents a wider range. The owning adaptation state adds or subtracts this magnitude per event and clamps the result to its configured state bounds.
    server.agents.behavior.AgentBehaviorAdaptationState.TARGET_LOST_FRUSTRATION_DELTA: '4'
    # Values: a finite non-negative integer; unit: milliseconds. Recommended: 5000-20000 around the tested baseline 10000; benchmark or observe behavior before moving outside this band.
    # Purpose: Controls how long Agents remain in or wait for budget window. Higher values make that pause or state last longer; lower values make them continue sooner.
    # Technical: the "behavior event listener" component consumes this as an integer. Unit: milliseconds; use 0 only where the owning policy explicitly treats it as immediate or disabled.
    server.agents.capabilities.behavior.AgentBehaviorEventListener.BUDGET_WINDOW_MS: '10000'
    # Values: a finite non-negative integer; unit: milliseconds. Recommended: 250-750 around the tested baseline 500; benchmark or observe behavior before moving outside this band.
    # Purpose: Keeps combat reactions prompt on quiet maps while still allowing personality-based timing differences to remain visible.
    # Technical: AgentCrowdScalingPolicy applies this base to the number of characters above QUIET_CHARACTER_THRESHOLD, then clamps the result to RESPONSE_MAX_MS. Unit: milliseconds.
    server.agents.capabilities.behavior.AgentCrowdScalingPolicy.RESPONSE_BASE_MS: '500'
    # Values: a finite non-negative integer; unit: milliseconds. Recommended: 75-250 around the tested baseline 150; benchmark or observe behavior before moving outside this band.
    # Purpose: Adds a predictable amount of combat-response headroom for every character present in the map.
    # Technical: This is the linear coefficient in the response-ceiling formula. Unit: milliseconds per character.
    server.agents.capabilities.behavior.AgentCrowdScalingPolicy.RESPONSE_PER_CHARACTER_MS: '150'
    # Values: a finite non-negative integer; unit: milliseconds. Recommended: 5-20 around the tested baseline 10; benchmark or observe behavior before moving outside this band.
    # Purpose: Makes response-time diversity grow faster in heavily populated maps without slowing quiet maps.
    # Technical: This is the quadratic coefficient in the response-ceiling formula. Unit: milliseconds per character squared.
    server.agents.capabilities.behavior.AgentCrowdScalingPolicy.RESPONSE_PER_CHARACTER_SQUARED_MS: '10'
    # Values: a finite non-negative integer; unit: milliseconds. Recommended: 7500-30000 around the tested baseline 15000; benchmark or observe behavior before moving outside this band.
    # Purpose: Prevents extremely crowded maps from producing impractically long combat reaction waits.
    # Technical: Hard upper bound for the calculated response ceiling. Unit: milliseconds; it prevents crowd scaling from delaying the combat scheduler indefinitely.
    server.agents.capabilities.behavior.AgentCrowdScalingPolicy.RESPONSE_MAX_MS: '15000'
    # Values: a finite non-negative integer; unit: milliseconds. Recommended: 1250-5000 around the tested baseline 2500; benchmark or observe behavior before moving outside this band.
    # Purpose: Defines which personality response value represents 100% of the live crowd ceiling. Current profiles use 2500ms as their most relaxed response.
    # Technical: A profile's stable response value is divided by this reference and multiplied by the live response ceiling. Unit: milliseconds and must be greater than zero.
    server.agents.capabilities.behavior.AgentCrowdScalingPolicy.RESPONSE_PROFILE_REFERENCE_MS: '2500'
    # Values: a finite non-negative integer. Recommended: 4-7 around the tested baseline 5; benchmark or observe behavior before moving outside this band.
    # Purpose: Defines the quiet-map population where Agents prioritize immediate kills, nearest targets, and uninterrupted plan progress.
    # Technical: Response growth uses only characters above this inclusive threshold; respite duration is zero at or below it, and target/anchor diversity has its own matching start threshold.
    server.agents.capabilities.behavior.AgentCrowdScalingPolicy.QUIET_CHARACTER_THRESHOLD: '5'
    # Values: a finite non-negative integer; unit: milliseconds. Recommended: 250-1000 around the tested baseline 500; benchmark or observe behavior before moving outside this band.
    # Purpose: Supplies the fixed part of crowd respite after the quiet-map allowance. With defaults, respite is disabled through 5 characters and its ceiling is about 1.9s at 10, 9.9s at 20, and 24.9s at 30.
    # Technical: AgentCrowdScalingPolicy applies REST_BASE_MS + excess * REST_PER_CHARACTER_MS + excess squared * REST_PER_CHARACTER_SQUARED_MS, where excess is the number of characters above QUIET_CHARACTER_THRESHOLD, then clamps to REST_MAX_MS.
    server.agents.capabilities.behavior.AgentCrowdScalingPolicy.REST_BASE_MS: '500'
    # Values: a finite non-negative integer; unit: milliseconds. Recommended: 50-200 around the tested baseline 100; benchmark or observe behavior before moving outside this band.
    # Purpose: Adds a modest amount of respite time per character as competition increases.
    # Technical: This is the linear coefficient in the respite-ceiling formula. Unit: milliseconds per character.
    server.agents.capabilities.behavior.AgentCrowdScalingPolicy.REST_PER_CHARACTER_MS: '100'
    # Values: a finite non-negative integer; unit: milliseconds. Recommended: 17-70 around the tested baseline 35; benchmark or observe behavior before moving outside this band.
    # Purpose: Lets relaxed Agents yield substantially longer only when a map becomes heavily crowded.
    # Technical: This is the quadratic coefficient in the respite-ceiling formula. Unit: milliseconds per character squared.
    server.agents.capabilities.behavior.AgentCrowdScalingPolicy.REST_PER_CHARACTER_SQUARED_MS: '35'
    # Values: a finite non-negative integer; unit: milliseconds. Recommended: 30000-120000 around the tested baseline 60000; benchmark or observe behavior before moving outside this band.
    # Purpose: Bounds a single crowd respite even in stress tests with very large cohorts.
    # Technical: Hard upper bound for the calculated respite ceiling. Unit: milliseconds; it prevents relaxed profiles from remaining paused indefinitely in crowded maps.
    server.agents.capabilities.behavior.AgentCrowdScalingPolicy.REST_MAX_MS: '60000'
    # Values: a finite non-negative integer; unit: milliseconds. Recommended: 17500-70000 around the tested baseline 35000; benchmark or observe behavior before moving outside this band.
    # Purpose: Defines which personality respite value represents 100% of the live crowd ceiling. Current relaxed profiles top out at 35000ms.
