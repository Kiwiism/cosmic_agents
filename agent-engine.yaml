    # Values: a finite non-negative integer. Recommended: 1-2 around the tested baseline 1; benchmark or observe behavior before moving outside this band.
    # Purpose: Controls how quickly an Agent's attack energy adapts after this event. Values farther from zero cause a larger behavior change; values nearer zero make adaptation more gradual.
    # Technical: the "behavior adaptation state" component consumes this as an integer. Domain: component-specific policy value; startup validation rejects missing, blank, or malformed values. The owning adaptation state adds or subtracts this magnitude per event and clamps the result to its configured state bounds.
