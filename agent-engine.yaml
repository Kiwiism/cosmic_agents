    # Purpose: Chooses how monster reaction mode works. Change it when selecting a different operating strategy rather than merely making the current strategy faster or slower.
    # Technical: the Agent engine deployment configuration consumes this as a text. Domain: component-specific policy value; startup validation rejects missing, blank, or malformed values. It is loaded once at server startup; changing the YAML requires a restart.
    AGENT_MOB_REACTION_MODE: PHYSICS
    # Purpose: Sets the spatial allowance for synthetic monster knockback distance horizontal. Larger values permit action across a wider or farther area.
    # Technical: the Agent engine deployment configuration consumes this as an integer. Unit: MapleStory map pixels; horizontal and vertical values use the server map coordinate system. It is loaded once at server startup; changing the YAML requires a restart.
    AGENT_SYNTHETIC_MOB_KNOCKBACK_DISTANCE_X: 12
    # Purpose: Sets the time allowance for synthetic monster knockback duration. Larger values keep the related state or wait active longer; smaller values make it expire or advance sooner.
    # Technical: the Agent engine deployment configuration consumes this as an integer. Unit: milliseconds; use 0 only where the owning policy explicitly treats it as immediate or disabled. It is loaded once at server startup; changing the YAML requires a restart.
    AGENT_SYNTHETIC_MOB_KNOCKBACK_DURATION_MS: 250
